baseURL = "https://blog.paparelli.com.ar"
title = "Playing at Carpe Diem"
paginate = 10
theme = "PaperMod"
defaultContentLanguage = "es"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  author = "Alberto Paparelli"
  description = "Blog sobre desarrollo, IA, proyectos y más."
  keywords = ["desarrollo", "programación", "IA", "proyectos"]
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = true
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi, I'm Alberto 👋"
    Content = "I build software, experiment with AI, and write about what I learn along the way, projects, dev rabbit holes, and whatever I'm currently obsessing over."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/carpe-diem"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/carpedev"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/albertopaparelli"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:alberto@paparelli.com.ar"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]
